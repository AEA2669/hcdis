<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFW Ramp Display</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #0d1520;
            --card: rgba(12, 20, 27, 0.88);
            --line: rgba(126, 162, 195, 0.25);
            --text-1: #ecf2f7;
            --text-2: #b9c8d5;
            --warn-bg: #b45f00;
            --warn-text: #fff6de;
            --yellow-bg: #9a7a00;
            --yellow-text: #fff7dd;
            --red-bg: #b52424;
            --red-text: #fff3f3;
            --info-bg: #0556a8;
            --info-text: #eff6ff;
            --idle-bg: #0d1520;
            --idle-text: #ecf2f7;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            font-family: "Segoe UI", "Trebuchet MS", sans-serif;
            background:
                radial-gradient(circle at 20% 15%, rgba(47, 155, 255, 0.18), transparent 35%),
                radial-gradient(circle at 88% 82%, rgba(180, 95, 0, 0.15), transparent 30%),
                var(--idle-bg);
            color: var(--text-1);
            transition: background-color 0.3s ease, color 0.3s ease;
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: clamp(10px, 2vw, 16px) clamp(14px, 3vw, 24px);
            border-bottom: 1px solid var(--line);
            background: rgba(10, 16, 22, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
            color: var(--text-2);
            font-size: clamp(0.68rem, 1.2vw, 0.88rem);
            flex-wrap: wrap;
        }

        .board-left, .board-right { display: flex; gap: 14px; align-items: center; }

        .status-badge {
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: 800;
            background: rgba(8, 14, 20, 0.7);
            color: var(--text-2);
        }

        .status-badge.connected {
            border-color: rgba(74, 222, 128, 0.55);
            color: #aaf5c3;
            background: rgba(22, 85, 45, 0.34);
        }

        .status-badge.stale {
            border-color: rgba(217, 119, 6, 0.55);
            color: #fcd34d;
            background: rgba(180, 95, 0, 0.25);
        }

        .build-badge {
            border: 1px solid rgba(126, 162, 195, 0.45);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: 800;
            background: rgba(8, 14, 20, 0.7);
            color: var(--text-2);
        }

        .diag-panel {
            border-bottom: 1px solid var(--line);
            background: rgba(10, 16, 22, 0.45);
            padding: 8px clamp(12px, 2.4vw, 18px);
        }

        .diag-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px;
        }

        .diag-tile {
            border: 1px solid rgba(126, 162, 195, 0.35);
            border-radius: 8px;
            background: rgba(8, 14, 20, 0.5);
            padding: 7px 8px;
        }

        .diag-label {
            font-size: 0.64rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-2);
            margin-bottom: 3px;
            font-weight: 700;
        }

        .diag-value {
            font-size: 0.8rem;
            color: #dce8f4;
            font-weight: 800;
            word-break: break-word;
        }

        .clock-display {
            display: flex;
            gap: 16px;
            font-size: clamp(0.75rem, 1.1vw, 0.9rem);
            font-family: "Courier New", monospace;
            font-weight: 700;
        }

        .clock-item { text-align: right; }
        .clock-label { font-size: 0.65em; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.06em; }
        .clock-time { color: var(--text-1); font-size: 1.1em; }

        .board-content {
            display: grid;
            grid-template-rows: 1fr auto;
            padding: clamp(12px, 2vw, 20px);
            gap: 12px;
            overflow-y: auto;
            flex: 1;
        }

        .main-alert-zone {
            display: grid;
            place-items: center;
            min-height: 160px;
        }

        #status-card {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: clamp(14px, 2.2vw, 22px);
            background: var(--card);
            box-shadow: 0 10px 32px rgba(0, 0, 0, 0.35);
            display: grid;
            gap: 10px;
            text-align: center;
        }

        #status-card h1 { margin: 0; font-size: clamp(0.95rem, 1.8vw, 1.2rem); color: #d8e5f1; letter-spacing: 0.1em; text-transform: uppercase; }
        #pin-display { font-size: clamp(2.2rem, 9vw, 5.5rem); font-weight: 900; letter-spacing: 0.16em; color: #ffffff; line-height: 1; }
        #connection-text { margin: 0; font-size: clamp(0.9rem, 1.6vw, 1.1rem); color: var(--text-2); font-weight: 600; }

        #alert-display {
            display: none;
            width: 100%;
            font-size: clamp(1.8rem, 6.5vw, 5.2rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            line-height: 1.08;
            color: var(--idle-text);
            text-wrap: balance;
            white-space: pre-wrap;
            word-break: break-word;
            text-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
            padding: clamp(14px, 2vw, 20px);
            border-radius: 12px;
        }

        .secondary-alerts {
            display: grid;
            grid-auto-flow: column;
            gap: 8px;
            overflow-x: auto;
            padding: 4px;
        }

        .alert-chip {
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: clamp(6px, 1.2vw, 10px) clamp(8px, 1.4vw, 12px);
            font-size: clamp(0.75rem, 1vw, 0.88rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .alert-chip.wind { background: rgba(180, 95, 0, 0.35); border-color: rgba(222, 133, 6, 0.6); color: #ffd8a8; }

        .memo-queue { display: grid; gap: 6px; min-height: 20px; max-height: 180px; overflow-y: auto; }
        .memo-item {
            border-left: 3px solid rgba(26, 116, 200, 0.7);
            background: rgba(5, 86, 168, 0.15);
            padding: clamp(8px, 1.2vw, 12px);
            border-radius: 6px;
            font-size: clamp(0.8rem, 1.1vw, 0.95rem);
            color: #bfd7ff;
            line-height: 1.3;
        }

        .rich-zone {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: rgba(8, 14, 20, 0.55);
            padding: clamp(8px, 1.4vw, 12px);
            display: grid;
            gap: 8px;
        }

        .rich-title {
            font-size: clamp(0.84rem, 1.1vw, 0.96rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #dce9f6;
        }

        .rich-frame {
            width: 100%;
            min-height: clamp(220px, 38vh, 420px);
            border: 1px solid rgba(126, 162, 195, 0.35);
            border-radius: 8px;
            background: rgba(7, 12, 18, 0.7);
        }

        .rich-image {
            max-width: 100%;
            width: auto;
            height: auto;
            max-height: 48vh;
            border-radius: 8px;
            border: 1px solid rgba(126, 162, 195, 0.35);
            object-fit: contain;
            justify-self: center;
        }

        .rich-text {
            font-size: clamp(0.9rem, 1.2vw, 1.04rem);
            line-height: 1.45;
            color: var(--text-1);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .metar-strip {
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            background: rgba(10, 16, 22, 0.6);
            padding: clamp(8px, 1.6vw, 12px) clamp(12px, 2.4vw, 18px);
            font-size: clamp(0.75rem, 1vw, 0.88rem);
            color: var(--text-2);
            font-family: "Courier New", monospace;
            line-height: 1.4;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .metar-header { font-weight: 700; color: var(--text-1); font-size: 0.9em; margin-bottom: 4px; }

        .idle-clock-zone {
            display: grid;
            gap: 24px;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .idle-clock-display { display: grid; gap: 16px; font-family: "Courier New", monospace; }
        .clock-large {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 0.08em;
            line-height: 1;
            text-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .clock-label-large {
            font-size: clamp(1rem, 2.4vw, 1.5rem);
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 700;
        }

        .idle-status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .status-tile {
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 10px;
            padding: 14px;
            background: rgba(22, 85, 45, 0.15);
            text-align: center;
        }

        .status-tile-label {
            font-size: 0.8rem;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .status-tile-value {
            font-size: 1.4rem;
            color: #aaf5c3;
            font-weight: 800;
        }

        .board-footer {
            border-top: 1px solid var(--line);
            background: rgba(10, 16, 22, 0.6);
            padding: clamp(8px, 1.6vw, 12px) clamp(12px, 2.4vw, 18px);
            color: var(--text-2);
            font-size: clamp(0.7rem, 1vw, 0.85rem);
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .hidden { display: none !important; }

        @media (max-width: 640px) {
            .board-header { flex-direction: column; align-items: flex-start; }
            .board-right { width: 100%; justify-content: space-between; }
            .clock-display { gap: 20px; }
        }
    </style>
</head>
<body>
    <header class="board-header">
        <div class="board-left">
            <span>DFW Ramp Alert Display</span>
            <div id="conn-badge" class="status-badge" aria-live="polite">Offline</div>
            <div id="metar-badge" class="status-badge" aria-live="polite">WX: Loading</div>
            <div id="build-stamp" class="build-badge">Build --</div>
        </div>
        <div class="board-right">
            <div class="clock-display">
                <div class="clock-item">
                    <div class="clock-label">DFW</div>
                    <div id="clock-dfw" class="clock-time">--:--:--</div>
                </div>
                <div class="clock-item">
                    <div class="clock-label">UTC</div>
                    <div id="clock-utc" class="clock-time">--:--:--</div>
                </div>
            </div>
        </div>
    </header>

    <section class="diag-panel" aria-label="Display diagnostics">
        <div class="diag-grid">
            <div class="diag-tile"><div class="diag-label">Last Error</div><div id="diag-last-error" class="diag-value">None</div></div>
            <div class="diag-tile"><div class="diag-label">Attempt Count</div><div id="diag-attempt" class="diag-value">0</div></div>
            <div class="diag-tile"><div class="diag-label">Active Peer ID</div><div id="diag-peer-id" class="diag-value">None</div></div>
            <div class="diag-tile"><div class="diag-label">Heartbeat</div><div id="diag-heartbeat" class="diag-value">Idle</div></div>
        </div>
    </section>

    <section class="board-content">
        <div class="main-alert-zone">
            <article id="status-card" role="status" aria-live="polite">
                <h1>Connection Pin</h1>
                <div id="pin-display">....</div>
                <p id="connection-text">Initializing connection...</p>
            </article>
            <div id="alert-display" role="alert" aria-live="assertive"></div>
        </div>

        <div id="secondary-zone" style="display: grid; gap: 8px;">
            <div id="secondary-alerts" class="secondary-alerts"></div>
            <div id="rich-zone" class="rich-zone hidden">
                <div id="rich-title" class="rich-title">Content Package</div>
                <div id="rich-body"></div>
            </div>
            <div id="memo-zone" class="hidden">
                <div style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-2); margin-bottom: 6px;">Active Memos:</div>
                <div id="memo-queue" class="memo-queue"></div>
            </div>
        </div>
    </section>

    <section class="metar-strip">
        <div class="metar-header">DFW Weather</div>
        <div id="metar-content">Loading weather data...</div>
    </section>

    <footer class="board-footer">
        <div id="footer-status">Status: Initializing</div>
        <div id="footer-time">Updated: --:--</div>
    </footer>

    <script>
        const alertState = {
            high_winds: { active: false, knots: 0 },
            lightning: { active: false, level: null },
            memos: [],
            content: { active: false, kind: null, payload: null, title: '', carouselActive: false, intervalSec: 8, items: [] }
        };

        function generatePin() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        let pin = generatePin();
        const pinDisplay = document.getElementById('pin-display');
        const connectionText = document.getElementById('connection-text');
        const alertDisplay = document.getElementById('alert-display');
        const statusCard = document.getElementById('status-card');
        const connBadge = document.getElementById('conn-badge');
        const metarBadge = document.getElementById('metar-badge');
        const metarContent = document.getElementById('metar-content');
        const secondaryAlerts = document.getElementById('secondary-alerts');
        const richZone = document.getElementById('rich-zone');
        const richTitle = document.getElementById('rich-title');
        const richBody = document.getElementById('rich-body');
        const memoZone = document.getElementById('memo-zone');
        const memoQueue = document.getElementById('memo-queue');
        const footerStatus = document.getElementById('footer-status');
        const footerTime = document.getElementById('footer-time');
        const clockDfw = document.getElementById('clock-dfw');
        const clockUtc = document.getElementById('clock-utc');
        const buildStamp = document.getElementById('build-stamp');
        const diagLastError = document.getElementById('diag-last-error');
        const diagAttempt = document.getElementById('diag-attempt');
        const diagPeerId = document.getElementById('diag-peer-id');
        const diagHeartbeat = document.getElementById('diag-heartbeat');

        let conn = null;
        let peer = null;
        let legacyPeer = null;
        let lastMetar = null;
        let metarStale = false;
        let carouselTimer = null;
        let carouselIndex = 0;
        let carouselIntervalSec = 8;
        let carouselItemsKey = '';
        let lastInboundSeq = 0;
        let peerGeneration = 0;
        let heartbeatRxTs = 0;
        let heartbeatUiTimer = null;
        const APP_VERSION = '2026.07.16-r2';
        const PEER_CONFIG = {
            host: '0.peerjs.com',
            port: 443,
            path: '/',
            secure: true,
            debug: 1
        };

        function setDiagnostics(update) {
            if (update.lastError !== undefined) {
                diagLastError.textContent = update.lastError || 'None';
            }
            if (update.attempt !== undefined) {
                diagAttempt.textContent = String(update.attempt);
            }
            if (update.peerId !== undefined) {
                diagPeerId.textContent = update.peerId || 'None';
            }
            if (update.heartbeat !== undefined) {
                diagHeartbeat.textContent = update.heartbeat;
            }
        }

        function startHeartbeatUiTicker() {
            clearInterval(heartbeatUiTimer);
            heartbeatUiTimer = setInterval(() => {
                if (!conn || !conn.open) {
                    setDiagnostics({ heartbeat: 'Idle' });
                    return;
                }
                if (!heartbeatRxTs) {
                    setDiagnostics({ heartbeat: 'Waiting...' });
                    return;
                }
                const ageSec = Math.max(0, Math.floor((Date.now() - heartbeatRxTs) / 1000));
                setDiagnostics({ heartbeat: ageSec + 's ago' });
            }, 1000);
        }

        function makeModernPeerId(pinCode) {
            return 'wxstat-show-' + pinCode;
        }

        function makeLegacyPeerId(pinCode) {
            return 'alex-dfw-show-' + pinCode;
        }

        function updateClocks() {
            const now = new Date();
            const utcTime = now.toLocaleTimeString('en-US', { timeZone: 'UTC', hour12: false });
            const dfwTime = now.toLocaleTimeString('en-US', { timeZone: 'America/Chicago', hour12: false });
            clockUtc.textContent = utcTime;
            clockDfw.textContent = dfwTime;
        }

        updateClocks();
        setInterval(updateClocks, 1000);

        async function fetchWeather() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=32.8974&longitude=-97.022&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m&temperature_unit=celsius&wind_speed_unit=knots&timezone=America/Chicago');
                if (!response.ok) {
                    throw new Error('weather_http_' + response.status);
                }
                const data = await response.json();

                if (data && data.current) {
                    lastMetar = data.current;
                    lastMetar.timestamp = new Date();
                    metarStale = false;
                    renderWeather();
                    metarBadge.textContent = 'WX: Fresh';
                    metarBadge.classList.remove('stale');
                } else {
                    metarStale = true;
                    metarBadge.textContent = 'WX: No data';
                    metarBadge.classList.add('stale');
                }
            } catch (err) {
                console.error('Weather fetch failed:', err);
                metarStale = true;
                metarBadge.textContent = 'WX: Offline';
                metarBadge.classList.add('stale');
                if (!lastMetar) metarContent.textContent = 'Weather data unavailable.';
            }
        }

        function renderWeather() {
            if (!lastMetar) { metarContent.textContent = 'No weather data.'; return; }
            const m = lastMetar;
            const time = m.timestamp ? m.timestamp.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' }) : 'N/A';
            const tempF = (m.temperature_2m * 9/5) + 32;
            const display = `DFW | ${time}\nTemp: ${m.temperature_2m.toFixed(1)}°C (${tempF.toFixed(1)}°F) | Humidity: ${m.relative_humidity_2m || 0}% | Wind: ${(m.wind_direction_10m || 0).toFixed(0)}° @ ${(m.wind_speed_10m || 0).toFixed(0)}KT`;
            metarContent.textContent = display;
            footerTime.textContent = 'Updated: ' + time;
        }

        fetchWeather();
        setInterval(fetchWeather, 60000);

        function sanitizeSimpleHtml(html) {
            const stripped = html
                .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '')
                .replace(/on[a-z]+\s*=\s*"[^"]*"/gi, '')
                .replace(/on[a-z]+\s*=\s*'[^']*'/gi, '');
            return stripped;
        }

        function stopCarouselTimer() {
            if (carouselTimer) {
                clearInterval(carouselTimer);
                carouselTimer = null;
            }
        }

        function ensureContentDefaults() {
            if (!alertState.content) {
                alertState.content = { active: false, kind: null, payload: null, title: '', carouselActive: false, intervalSec: 8, items: [] };
            }
            if (!Array.isArray(alertState.content.items)) {
                alertState.content.items = [];
            }
            if (typeof alertState.content.intervalSec !== 'number') {
                alertState.content.intervalSec = 8;
            }
            if (typeof alertState.content.carouselActive !== 'boolean') {
                alertState.content.carouselActive = false;
            }
        }

        function renderSingleContentItem(item) {
            richBody.innerHTML = '';

            if (item.kind === 'text') {
                const div = document.createElement('div');
                div.className = 'rich-text';
                div.textContent = String(item.payload);
                richBody.appendChild(div);
                return;
            }

            if (item.kind === 'image') {
                const img = document.createElement('img');
                img.className = 'rich-image';
                img.loading = 'lazy';
                img.src = String(item.payload);
                img.alt = item.title || 'Shared image content';
                richBody.appendChild(img);
                return;
            }

            if (item.kind === 'video') {
                const video = document.createElement('video');
                video.className = 'rich-frame';
                video.controls = true;
                video.autoplay = true;
                video.muted = true;
                video.loop = true;
                video.playsInline = true;
                video.src = String(item.payload);
                richBody.appendChild(video);
                return;
            }

            if (item.kind === 'embed') {
                const frame = document.createElement('iframe');
                frame.className = 'rich-frame';
                frame.src = String(item.payload);
                frame.setAttribute('loading', 'lazy');
                frame.setAttribute('referrerpolicy', 'no-referrer');
                frame.title = item.title || 'Embedded content';
                richBody.appendChild(frame);
                return;
            }

            if (item.kind === 'html') {
                const block = document.createElement('div');
                block.className = 'rich-text';
                block.innerHTML = sanitizeSimpleHtml(String(item.payload));
                richBody.appendChild(block);
                return;
            }

            const fallback = document.createElement('div');
            fallback.className = 'rich-text';
            fallback.textContent = String(item.payload);
            richBody.appendChild(fallback);
        }

        function renderRichContent() {
            ensureContentDefaults();
            const content = alertState.content;

            if (content.carouselActive && content.items.length > 0) {
                const interval = Math.max(2, Math.min(120, Math.floor(Number(content.intervalSec) || 8)));
                const key = content.items.map((item) => item.id || '').join('|') + '|' + interval;

                if (carouselIndex >= content.items.length) {
                    carouselIndex = 0;
                }

                richZone.classList.remove('hidden');
                richTitle.textContent = content.title || ('Carousel Playlist (' + content.items.length + ' items)');
                renderSingleContentItem(content.items[carouselIndex]);

                if (!carouselTimer || carouselIntervalSec !== interval || carouselItemsKey !== key) {
                    stopCarouselTimer();
                    carouselIntervalSec = interval;
                    carouselItemsKey = key;
                    carouselTimer = setInterval(() => {
                        if (!alertState.content || !alertState.content.carouselActive || !Array.isArray(alertState.content.items) || alertState.content.items.length === 0) {
                            stopCarouselTimer();
                            return;
                        }
                        carouselIndex = (carouselIndex + 1) % alertState.content.items.length;
                        renderSingleContentItem(alertState.content.items[carouselIndex]);
                    }, interval * 1000);
                }
                return;
            }

            stopCarouselTimer();
            carouselIndex = 0;
            carouselItemsKey = '';

            if (!content.active || !content.kind || !content.payload) {
                richZone.classList.add('hidden');
                richBody.innerHTML = '';
                return;
            }

            richZone.classList.remove('hidden');
            richTitle.textContent = content.title || ('Content Package - ' + content.kind.toUpperCase());
            renderSingleContentItem(content);
        }

        function determineHighestSeverity() {
            if (alertState.lightning.active && alertState.lightning.level === 'red') return 'red';
            if (alertState.lightning.active && alertState.lightning.level === 'yellow') return 'yellow';
            if (alertState.high_winds.active) return 'wind';
            if (alertState.memos.length > 0) return 'memo';
            if (alertState.content.active) return 'content';
            return null;
        }

        function renderSignage() {
            const severity = determineHighestSeverity();
            const isConnected = Boolean(conn && conn.open);

            if (!severity) {
                statusCard.style.display = isConnected ? 'none' : 'grid';
                alertDisplay.style.display = 'none';
                
                let idleZone = document.getElementById('idle-clock-zone-elem');
                if (!idleZone) {
                    idleZone = document.createElement('div');
                    idleZone.id = 'idle-clock-zone-elem';
                    idleZone.className = 'idle-clock-zone';
                    
                    const clockDiv = document.createElement('div');
                    clockDiv.className = 'idle-clock-display';
                    clockDiv.innerHTML = `
                        <div><div class="clock-label-large">DFW Local</div><div id="idle-clock-dfw" class="clock-large">--:--:--</div></div>
                        <div><div class="clock-label-large">UTC</div><div id="idle-clock-utc" class="clock-large">--:--:--</div></div>
                    `;
                    
                    const statusGrid = document.createElement('div');
                    statusGrid.className = 'idle-status-grid';
                    statusGrid.innerHTML = `
                        <div class="status-tile"><div class="status-tile-label">Connection</div><div id="idle-conn" class="status-tile-value">Ready</div></div>
                        <div class="status-tile"><div class="status-tile-label">Weather</div><div id="idle-wx" class="status-tile-value">Fresh</div></div>
                        <div class="status-tile"><div class="status-tile-label">Alerts</div><div id="idle-alerts" class="status-tile-value">None</div></div>
                    `;
                    
                    idleZone.appendChild(clockDiv);
                    idleZone.appendChild(statusGrid);
                    document.querySelector('.main-alert-zone').appendChild(idleZone);
                }

                idleZone.style.display = isConnected ? 'grid' : 'none';
                const now = new Date();
                const utcTime = now.toLocaleTimeString('en-US', { timeZone: 'UTC', hour12: false });
                const dfwTime = now.toLocaleTimeString('en-US', { timeZone: 'America/Chicago', hour12: false });
                const el1 = document.getElementById('idle-clock-dfw');
                const el2 = document.getElementById('idle-clock-utc');
                if (el1) el1.textContent = dfwTime;
                if (el2) el2.textContent = utcTime;
                const el3 = document.getElementById('idle-conn');
                if (el3) el3.textContent = conn && conn.open ? '✓ Active' : '⊘ Idle';
                const el4 = document.getElementById('idle-wx');
                if (el4) el4.textContent = metarStale ? '⚠ Stale' : '✓ Fresh';
                const el5 = document.getElementById('idle-alerts');
                if (el5) el5.textContent = '0 Active';
                
                secondaryAlerts.innerHTML = '';
                memoZone.classList.add('hidden');
                renderRichContent();
                document.body.style.backgroundColor = 'var(--idle-bg)';
                document.body.style.color = 'var(--idle-text)';
                footerStatus.textContent = isConnected ? 'Status: Ready' : 'Status: Waiting for control connection';
                return;
            }
            
            const idleZone = document.getElementById('idle-clock-zone-elem');
            if (idleZone) idleZone.style.display = 'none';

            statusCard.style.display = 'none';
            alertDisplay.style.display = 'block';
            memoZone.classList.remove('hidden');
            footerStatus.textContent = 'Status: Alert (' + severity + ')';

            if (severity === 'red') {
                document.body.style.backgroundColor = 'var(--red-bg)';
                document.body.style.color = 'var(--red-text)';
                alertDisplay.textContent = 'Red Alert\nLightning 3 Miles\nRamp Closed';
            } else if (severity === 'yellow') {
                document.body.style.backgroundColor = 'var(--yellow-bg)';
                document.body.style.color = 'var(--yellow-text)';
                alertDisplay.textContent = 'Yellow Alert\nLightning 10 Miles';
            } else if (severity === 'wind') {
                document.body.style.backgroundColor = 'var(--warn-bg)';
                document.body.style.color = 'var(--warn-text)';
                alertDisplay.textContent = 'High Wind\n' + alertState.high_winds.knots + ' KTS';
            } else if (severity === 'memo') {
                document.body.style.backgroundColor = 'var(--info-bg)';
                document.body.style.color = 'var(--info-text)';
                alertDisplay.textContent = alertState.memos[0]?.text || '';
            } else if (severity === 'content') {
                document.body.style.backgroundColor = 'var(--info-bg)';
                document.body.style.color = 'var(--info-text)';
                alertDisplay.textContent = 'Content Package Active';
            }

            secondaryAlerts.innerHTML = '';
            if (severity !== 'wind' && alertState.high_winds.active) {
                const chip = document.createElement('div');
                chip.className = 'alert-chip wind';
                chip.textContent = 'Wind: ' + alertState.high_winds.knots + 'KT';
                secondaryAlerts.appendChild(chip);
            }

            renderMemoQueue();
            renderRichContent();
        }

        function renderMemoQueue() {
            memoQueue.innerHTML = '';
            if (alertState.memos.length === 0) {
                memoZone.classList.add('hidden');
                return;
            }
            memoZone.classList.remove('hidden');
            alertState.memos.forEach((memo) => {
                const item = document.createElement('div');
                item.className = 'memo-item';
                item.textContent = memo.text;
                memoQueue.appendChild(item);
            });
        }

        function updateConnectionBadge(connected) {
            if (connected) {
                connBadge.textContent = 'Connected';
                connBadge.classList.add('connected');
            } else {
                connBadge.textContent = 'Offline';
                connBadge.classList.remove('connected');
            }
        }

        function parseIncomingMessage(data) {
            try {
                const msg = typeof data === 'string' ? JSON.parse(data) : data;

                if (msg && msg.type === 'heartbeat_ping') {
                    heartbeatRxTs = Date.now();
                    if (conn && conn.open) {
                        conn.send(JSON.stringify({ type: 'heartbeat_pong', ts: msg.ts || Date.now(), appVersion: APP_VERSION }));
                    }
                    return;
                }

                if (typeof msg.seq === 'number') {
                    if (msg.seq <= lastInboundSeq) {
                        return;
                    }
                    lastInboundSeq = msg.seq;
                }

                if (msg.version === 1 && msg.alerts) {
                    alertState.high_winds = msg.alerts.high_winds || { active: false, knots: 0 };
                    alertState.lightning = msg.alerts.lightning || { active: false, level: null };
                    alertState.memos = msg.alerts.memos || [];
                    alertState.content = msg.alerts.content || { active: false, kind: null, payload: null, title: '', carouselActive: false, intervalSec: 8, items: [] };
                    footerStatus.textContent = 'Status: Alert sync (' + (msg.appVersion || 'legacy') + ')';
                    renderSignage();
                    return;
                }
                if (msg.type === 'high_winds') {
                    alertState.high_winds.active = true;
                    alertState.high_winds.knots = msg.knots ?? 0;
                } else if (msg.type === 'yellow_alert') {
                    alertState.lightning.active = true;
                    alertState.lightning.level = 'yellow';
                } else if (msg.type === 'red_alert') {
                    alertState.lightning.active = true;
                    alertState.lightning.level = 'red';
                } else if (msg.type === 'info_memo') {
                    alertState.memos.push({ id: 'memo_' + Date.now(), text: msg.text, timestamp: Date.now() });
                }
                renderSignage();
            } catch (e) {
                console.error('Invalid message:', data);
            }
        }

        function bindShowPeerHandlers(instance, label, isPrimary, generation) {
            instance.on('open', () => {
                if (generation !== peerGeneration) {
                    return;
                }
                const modernId = makeModernPeerId(pin);
                const legacyId = makeLegacyPeerId(pin);
                pinDisplay.textContent = pin;
                connectionText.textContent = 'Ready on PIN ' + pin + ' (' + modernId + ' / ' + legacyId + ') v' + APP_VERSION + '.';
                setDiagnostics({ peerId: label === 'modern' ? modernId : legacyId, attempt: generation });
            });

            instance.on('connection', (conn_) => {
                if (generation !== peerGeneration) {
                    try {
                        conn_.close();
                    } catch (_) {
                        // Ignore close errors on stale generation.
                    }
                    return;
                }
                conn = conn_;
                conn.on('open', () => {
                    if (generation !== peerGeneration) {
                        return;
                    }
                    updateConnectionBadge(true);
                    heartbeatRxTs = 0;
                    connectionText.textContent = 'Control link active via ' + label + '.';
                    setDiagnostics({ peerId: conn.peer || (label + '-listener'), lastError: '' });
                });
                conn.on('data', (data) => {
                    if (generation !== peerGeneration) {
                        return;
                    }
                    parseIncomingMessage(data);
                });
                conn.on('close', () => {
                    if (generation !== peerGeneration) {
                        return;
                    }
                    updateConnectionBadge(false);
                    connectionText.textContent = 'Disconnected. Waiting for reconnect on PIN ' + pin + '.';
                    alertState.high_winds.active = false;
                    alertState.lightning.active = false;
                    alertState.memos = [];
                    alertState.content = { active: false, kind: null, payload: null, title: '', carouselActive: false, intervalSec: 8, items: [] };
                    lastInboundSeq = 0;
                    heartbeatRxTs = 0;
                    renderSignage();
                });
                conn.on('error', () => {
                    if (generation !== peerGeneration) {
                        return;
                    }
                    updateConnectionBadge(false);
                    setDiagnostics({ lastError: 'connection-error' });
                });
            });

            instance.on('error', (err) => {
                if (generation !== peerGeneration) {
                    return;
                }
                updateConnectionBadge(false);

                if (!isPrimary && err && err.type === 'unavailable-id') {
                    return;
                }

                setDiagnostics({ lastError: err?.type || 'peer-error' });

                if (err && err.type === 'unavailable-id' && isPrimary) {
                    pin = generatePin();
                    pinDisplay.textContent = pin;
                    connectionText.textContent = 'PIN conflict detected. New PIN generated.';
                    setTimeout(setupPeer, 350);
                    return;
                }

                if (isPrimary && err && (err.type === 'network' || err.type === 'socket-error' || err.type === 'server-error')) {
                    connectionText.textContent = 'Signaling interrupted. Reconnecting...';
                    setTimeout(() => {
                        setupPeer();
                    }, 1200);
                    return;
                }

                connectionText.textContent = 'Signaling issue (' + label + '): ' + (err?.type || 'unknown') + '. Keep page open.';
            });

            instance.on('disconnected', () => {
                if (generation !== peerGeneration) {
                    return;
                }
                if (!isPrimary) {
                    return;
                }
                updateConnectionBadge(false);
                connectionText.textContent = 'Signaling disconnected. Reconnecting...';
                setDiagnostics({ lastError: 'signaling-disconnected' });
                try {
                    instance.reconnect();
                } catch (_) {
                    setTimeout(() => {
                        setupPeer();
                    }, 1200);
                }
            });

            instance.on('close', () => {
                if (generation !== peerGeneration) {
                    return;
                }
                if (!isPrimary) {
                    return;
                }
                updateConnectionBadge(false);
                connectionText.textContent = 'Peer closed. Restarting session...';
                setDiagnostics({ lastError: 'peer-closed' });
                setTimeout(() => {
                    setupPeer();
                }, 1200);
            });
        }

        function setupPeer() {
            peerGeneration += 1;
            const generation = peerGeneration;
            pinDisplay.textContent = pin;
            connectionText.textContent = 'Bring control page online and enter this PIN.';

            if (peer) {
                try {
                    peer.destroy();
                } catch (_) {
                    // Ignore cleanup errors when rotating IDs.
                }
            }

            if (legacyPeer) {
                try {
                    legacyPeer.destroy();
                } catch (_) {
                    // Ignore cleanup errors when rotating IDs.
                }
            }

            const modernId = makeModernPeerId(pin);
            const legacyId = makeLegacyPeerId(pin);
            peer = new Peer(modernId, PEER_CONFIG);
            legacyPeer = new Peer(legacyId, PEER_CONFIG);

            bindShowPeerHandlers(peer, 'modern', true, generation);
            bindShowPeerHandlers(legacyPeer, 'legacy', false, generation);
        }

        setupPeer();
        buildStamp.textContent = 'Build ' + APP_VERSION;
        setDiagnostics({ heartbeat: 'Idle', peerId: '', attempt: 0, lastError: '' });
        startHeartbeatUiTicker();

        setInterval(() => {
            const idleZone = document.getElementById('idle-clock-zone-elem');
            if (idleZone && idleZone.style.display !== 'none') {
                const now = new Date();
                const utcTime = now.toLocaleTimeString('en-US', { timeZone: 'UTC', hour12: false });
                const dfwTime = now.toLocaleTimeString('en-US', { timeZone: 'America/Chicago', hour12: false });
                const dfw = document.getElementById('idle-clock-dfw');
                const utc = document.getElementById('idle-clock-utc');
                if (dfw) dfw.textContent = dfwTime;
                if (utc) utc.textContent = utcTime;
            }
        }, 1000);

        renderSignage();
    </script>
